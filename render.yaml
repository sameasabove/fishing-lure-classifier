# Blueprint at repo root — service code lives in backend/ (monorepo).
# See https://render.com/docs/monorepo-support
services:
  - type: web
    name: fishing-lure-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_PORT
        value: 10000
      - key: FLASK_DEBUG
        value: False
      - key: CHATGPT_MODEL
        value: gpt-4o-mini
      - key: MAX_TOKENS
        value: 500
