<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terms of Service - My Tackle Box</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 24px 16px 48px; background: #f5f5f5; color: #222; line-height: 1.55; }
    .wrap { max-width: 720px; margin: 0 auto; background: #fff; padding: 28px 24px 40px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    h2 { font-size: 1.2rem; margin: 1.75rem 0 0.75rem; border-bottom: 1px solid #eee; padding-bottom: 0.35rem; }
    h3 { font-size: 1.05rem; margin: 1.25rem 0 0.5rem; }
    h4 { font-size: 1rem; margin: 1rem 0 0.4rem; }
    p { margin: 0.5rem 0; }
    ul { margin: 0.5rem 0 0.75rem; padding-left: 1.25rem; }
    li { margin: 0.25rem 0; }
    strong { font-weight: 600; }
    hr { border: none; border-top: 1px solid #ddd; margin: 1.5rem 0; }
    .muted { color: #666; font-size: 0.9rem; margin-bottom: 1.25rem; }
    .err { background: #ffebee; color: #b71c1c; padding: 12px; border-radius: 8px; margin: 12px 0; font-size: 14px; }
    a { color: #1565c0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="content"><p class="muted">Loading terms…</p></div>
  </div>
  <script>
    (function () {
      var PRIVACY_HREF = 'PRIVACY_POLICY.html';

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function inlineBold(s) {
        return esc(s).replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      }

      function render(md) {
        md = md.replace(/\[PRIVACY_POLICY_URL\]/g, PRIVACY_HREF);
        var lines = md.split(/\r?\n/);
        var html = '';
        var inUl = false;

        function closeUl() {
          if (inUl) {
            html += '</ul>';
            inUl = false;
          }
        }

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var t = line.trim();

          if (t === '') {
            closeUl();
            continue;
          }
          if (t === '---') {
            closeUl();
            html += '<hr />';
            continue;
          }
          if (t.indexOf('- ') === 0) {
            if (!inUl) {
              html += '<ul>';
              inUl = true;
            }
            html += '<li>' + inlineBold(t.slice(2)) + '</li>';
            continue;
          }

          closeUl();

          if (t.indexOf('#### ') === 0) {
            html += '<h4>' + inlineBold(t.slice(5)) + '</h4>';
            continue;
          }
          if (t.indexOf('### ') === 0) {
            html += '<h3>' + inlineBold(t.slice(4)) + '</h3>';
            continue;
          }
          if (t.indexOf('## ') === 0) {
            html += '<h2>' + inlineBold(t.slice(3)) + '</h2>';
            continue;
          }
          if (t.indexOf('# ') === 0) {
            html += '<h1>' + inlineBold(t.slice(2)) + '</h1>';
            continue;
          }

          html += '<p>' + inlineBold(line) + '</p>';
        }
        closeUl();
        return html;
      }

      var mdUrl = new URL('../docs/TERMS_OF_SERVICE.md', window.location.href).href;

      fetch(mdUrl)
        .then(function (r) {
          if (!r.ok) throw new Error('Could not load terms (' + r.status + ')');
          return r.text();
        })
        .then(function (text) {
          document.getElementById('content').innerHTML = render(text);
        })
        .catch(function (e) {
          document.getElementById('content').innerHTML =
            '<p class="err">Could not load terms. Open the <a href="' +
            esc(mdUrl) +
            '">markdown file</a> or try again later.</p><p>' +
            esc(e.message || String(e)) +
            '</p>';
        });
    })();
  </script>
</body>
</html>
